spring:
  application:
    name: document-intelligence-platform
  
  datasource:
    url: jdbc:postgresql://localhost:5432/mydatabase
    username: myuser
    password: secret
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    show-sql: true

  docker:
    compose:
      skip:
        in-tests: true

  ai:
    openai:
      api-key: ${OPENAI_API_KEY:dummy-key-for-test-and-build}
      chat:
        options:
          model: gpt-4o
    vectorstore:
      pgvector:
        initialize-schema: true
